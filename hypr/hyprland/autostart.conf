# --- BACKGROUND SERVICES ---
# exec-once =  hyprlock
exec-once = waybar
exec-once = swww-daemon  # Wallpaper engine
exec-once = dunst       # Notification Daemon
exec-once = hypridle  # Idle Manager
exec-once = ollama serve  # Idle Manager

# --- CLIPBOARD MANAGER ---
exec-once = wl-paste --type text --watch cliphist store 
; exec-once =  wl-paste --type image --watch cliphist store

# --- Slow app launch fix -- set systemd vars
exec-once = systemctl --user import-environment $(env | cut -d'=' -f 1
exec-once = dbus-update-activation-environment --systemd --all

# --- OTHERS ---    
exec-once = hyprctl dispatch workspace 3 # open workspace 3 on boot
exec-once = ~/.config/waybar/scripts/weather.py # Fetch weather data
exec-once = sleep 0.2 && ~/.config/hypr/scripts/random_wallpaper.sh -random # Set Random Wallpaper
exec-once = sleep 0.4 && conky -c ~/.config/conky/theme.config  # Date & Time